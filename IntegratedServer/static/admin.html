<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieZone Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e1a; --bg-secondary: #111827;
            --bg-card: rgba(17,24,39,0.8); --bg-input: rgba(30,41,59,0.8);
            --border: rgba(6,182,212,0.2); --border-focus: rgba(6,182,212,0.6);
            --text-primary: #e2e8f0; --text-secondary: #94a3b8;
            --accent: #06b6d4; --accent-hover: #22d3ee;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-primary);
            color: var(--text-primary); min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(6,182,212,0.06) 0%, transparent 60%);
        }
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 48px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .login-card h2 {
            text-align: center; font-size: 1.6rem; font-weight: 700;
            background: linear-gradient(135deg, #06b6d4, #22c55e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px;
        }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-size: 0.9rem; font-family: inherit; }
        input:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
        .form-group { margin-bottom: 16px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #0891b2); color: #fff; box-shadow: 0 4px 15px rgba(6,182,212,0.3); }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-block { width: 100%; justify-content: center; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 8px; }

        #dashboard { display: none; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .topbar h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .role-badge { background: linear-gradient(135deg, #06b6d4, #22c55e); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .main-content { padding: 24px; max-width: 1000px; margin: 0 auto; }

        .tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: 14px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
        .tab-btn { padding: 10px 16px; border: none; border-radius: 10px; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; font-weight: 500; font-family: inherit; }
        .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(6,182,212,0.4); }
        .tab-panel { display: none; animation: fadeIn 0.3s; }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
        .card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        .toggle { display: flex; align-items: center; gap: 10px; }
        .toggle-switch { width: 44px; height: 24px; border-radius: 12px; background: #4b5563; cursor: pointer; position: relative; transition: background 0.2s; }
        .toggle-switch.on { background: var(--success); }
        .toggle-switch::after { content: ''; width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 3px; left: 3px; transition: transform 0.2s; }
        .toggle-switch.on::after { transform: translateX(20px); }

        .generated-link { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 12px; padding: 16px; margin-top: 16px; display: none; }
        .generated-link.show { display: block; }
        .link-url { background: var(--bg-input); padding: 10px 14px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 8px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

        .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; padding: 14px 24px; border-radius: 12px; font-size: 0.9rem; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: var(--success); color: #000; }
        .toast-error { background: var(--danger); color: #fff; }

        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="loginScreen">
    <div class="login-card">
        <h2>🛡️ Admin Login</h2>
        <div class="form-group"><label>Admin ID</label><input type="text" id="loginId" placeholder="Enter admin ID"></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div>
        <button class="btn btn-primary btn-block" onclick="doLogin()" style="margin-top:8px">Login</button>
    </div>
</div>

<div id="dashboard">
    <div class="topbar">
        <h1>🎬 MovieZone Admin</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="role-badge">ADMIN</span>
            <button class="btn btn-sm btn-outline" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('addSingle', this)">➕ Single</button>
            <button class="tab-btn" onclick="switchTab('addQuality', this)">🎞️ Quality</button>
            <button class="tab-btn" onclick="switchTab('addEpisode', this)">📺 Episodes</button>
        </div>

        <!-- Single -->
        <div class="tab-panel active" id="tab-addSingle">
            <div class="card">
                <h3>➕ Add Single Movie Link</h3>
                <div class="form-group"><label>Movie Name</label><input type="text" id="singleName" placeholder="e.g. Interstellar"></div>
                <div class="form-group"><label>Download Link</label><input type="text" id="singleLink" placeholder="https://..."></div>
                <div class="toggle form-group"><span>Ads Enabled</span><div class="toggle-switch on" id="singleAds" onclick="this.classList.toggle('on')"></div></div>
                <button class="btn btn-primary" onclick="addMovie('single')">Submit for Review</button>
                <div class="generated-link" id="singleResult"><strong>✅ Submitted!</strong><div class="link-url"><span id="singleUrl"></span></div></div>
            </div>
        </div>

        <!-- Quality -->
        <div class="tab-panel" id="tab-addQuality">
            <div class="card">
                <h3>🎞️ Add Quality Movie</h3>
                <div class="form-group"><label>Movie Name</label><input type="text" id="qualityName" placeholder="e.g. The Dark Knight"></div>
                <div class="form-row">
                    <div class="form-group"><label>480p</label><input type="text" id="q480" placeholder="https://..."></div>
                    <div class="form-group"><label>720p</label><input type="text" id="q720" placeholder="https://..."></div>
                    <div class="form-group"><label>1080p</label><input type="text" id="q1080" placeholder="https://..."></div>
                </div>
                <div class="toggle form-group"><span>Ads Enabled</span><div class="toggle-switch on" id="qualityAds" onclick="this.classList.toggle('on')"></div></div>
                <button class="btn btn-primary" onclick="addMovie('quality')">Submit for Review</button>
                <div class="generated-link" id="qualityResult"><strong>✅ Submitted!</strong><div class="link-url"><span id="qualityUrl"></span></div></div>
            </div>
        </div>

        <!-- Episodes -->
        <div class="tab-panel" id="tab-addEpisode">
            <div class="card">
                <h3>📺 Add Episode Series</h3>
                <div class="form-group"><label>Series Name</label><input type="text" id="epName" placeholder="e.g. Stranger Things S02"></div>
                <div id="epRows"></div>
                <button class="btn btn-sm btn-outline" onclick="addEpRow()" style="margin:10px 0">+ Add Episode</button>
                <div class="toggle form-group"><span>Ads Enabled</span><div class="toggle-switch on" id="epAds" onclick="this.classList.toggle('on')"></div></div>
                <button class="btn btn-primary" onclick="addMovie('episode')">Submit for Review</button>
                <div class="generated-link" id="epResult"><strong>✅ Submitted!</strong><div class="link-url"><span id="epUrl"></span></div></div>
            </div>
        </div>
    </div>
</div>

<script>
const API = '';
function showToast(m,t='success'){const e=document.getElementById('toast');e.textContent=m;e.className='toast toast-'+t+' show';setTimeout(()=>e.className='toast',3000);}

function switchTab(n,b){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+n).classList.add('active');b.classList.add('active');}

async function doLogin(){
    const id=document.getElementById('loginId').value.trim();
    const pass=document.getElementById('loginPass').value.trim();
    if(!id||!pass)return showToast('Enter credentials','error');
    try{
        const r=await fetch(API+'/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminId:id,adminPassword:pass})});
        const d=await r.json();
        if(d.success){document.getElementById('loginScreen').style.display='none';document.getElementById('dashboard').style.display='block';localStorage.setItem('mz_admin','1');showToast('Welcome!');}
        else showToast(d.error||'Invalid credentials','error');
    }catch(e){showToast('Login failed','error');}
}
function doLogout(){localStorage.removeItem('mz_admin');document.getElementById('dashboard').style.display='none';document.getElementById('loginScreen').style.display='flex';}
if(localStorage.getItem('mz_admin')){document.getElementById('loginScreen').style.display='none';document.getElementById('dashboard').style.display='block';}

async function addMovie(type){
    let body={status:'pending'};
    if(type==='single'){
        body.title=document.getElementById('singleName').value.trim();
        body.originalLink=document.getElementById('singleLink').value.trim();
        body.downloadType='single';
        body.adsEnabled=document.getElementById('singleAds').classList.contains('on');
        if(!body.title)return showToast('Enter name','error');
    }else if(type==='quality'){
        body.title=document.getElementById('qualityName').value.trim();
        body.downloadType='quality';
        body.quality480p=document.getElementById('q480').value.trim()||null;
        body.quality720p=document.getElementById('q720').value.trim()||null;
        body.quality1080p=document.getElementById('q1080').value.trim()||null;
        body.adsEnabled=document.getElementById('qualityAds').classList.contains('on');
        if(!body.title)return showToast('Enter name','error');
    }else if(type==='episode'){
        body.title=document.getElementById('epName').value.trim();
        body.downloadType='episode';
        body.adsEnabled=document.getElementById('epAds').classList.contains('on');
        const rows=document.querySelectorAll('#epRows > div');
        const eps=[];rows.forEach((r,i)=>eps.push({episodeNumber:i+1,quality480p:r.querySelector('.e480').value.trim(),quality720p:r.querySelector('.e720').value.trim(),quality1080p:r.querySelector('.e1080').value.trim()}));
        body.episodes=JSON.stringify(eps);
        if(!body.title)return showToast('Enter name','error');
    }
    try{
        const r=await fetch(API+'/api/movie-links',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await r.json();
        if(d.success||d.shortUrl){
            const eid=type==='single'?'singleResult':type==='quality'?'qualityResult':'epResult';
            const uid=type==='single'?'singleUrl':type==='quality'?'qualityUrl':'epUrl';
            document.getElementById(uid).textContent=d.shortUrl||'Submitted for review';
            document.getElementById(eid).classList.add('show');
            showToast('Submitted for owner review!');
        }else showToast(d.error||'Failed','error');
    }catch(e){showToast('Error','error');}
}

let epCount=0;
function addEpRow(){epCount++;const d=document.createElement('div');d.style.cssText='display:grid;grid-template-columns:50px 1fr 1fr 1fr 40px;gap:8px;margin-bottom:8px;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;align-items:center;';d.innerHTML=`<span style="font-weight:700;color:var(--accent);text-align:center">E${epCount}</span><input class="e480" placeholder="480p link"><input class="e720" placeholder="720p link"><input class="e1080" placeholder="1080p link"><button class="btn btn-sm" style="background:var(--danger);color:#fff;padding:4px 8px" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('epRows').appendChild(d);}
addEpRow();
</script>
</body>
</html>
