<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieZone Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e, #0d0d2b);
            color: #e0e0e0; min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.3); padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 1.3rem; color: #00d2ff; }
        .logout-btn {
            background: rgba(255,0,0,0.2); color: #ff6b6b; border: 1px solid rgba(255,0,0,0.3);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        .login-container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 2rem;
        }
        .login-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 3rem; width: 400px; max-width: 95%;
            backdrop-filter: blur(10px);
        }
        .login-box h2 { text-align: center; margin-bottom: 2rem; color: #00d2ff; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #8899aa; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08); color: #fff;
            font-size: 0.95rem; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #00d2ff;
        }
        .submit-btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,210,255,0.3); }
        .dashboard { display: none; }
        .tabs {
            display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }
        .tab {
            padding: 14px 24px; cursor: pointer; color: #8899aa;
            border-bottom: 3px solid transparent; transition: all 0.3s;
            white-space: nowrap; font-size: 0.9rem;
        }
        .tab.active { color: #00d2ff; border-bottom-color: #00d2ff; background: rgba(0,210,255,0.05); }
        .tab:hover { color: #00d2ff; }
        .tab-content { padding: 2rem; display: none; }
        .tab-content.active { display: block; }
        .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
        }
        .card h3 { color: #00d2ff; margin-bottom: 0.5rem; }
        .movie-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; border-radius: 10px; margin-bottom: 0.5rem;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
        }
        .movie-info h4 { color: #fff; margin-bottom: 0.3rem; }
        .card-meta { color: #8899aa; font-size: 0.85rem; }
        .btn-sm {
            padding: 6px 14px; border-radius: 8px; font-size: 0.8rem;
            border: none; cursor: pointer; font-weight: 600;
        }
        .btn-delete { background: rgba(255,0,0,0.15); color: #ff6666; }
        .movie-actions { display: flex; gap: 0.5rem; }
        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; margin-right: 4px;
        }
        .tag-pending { background: rgba(255,165,0,0.2); color: #ffa500; }
        .tag-approved { background: rgba(0,200,100,0.2); color: #00c864; }
        .msg { padding: 12px; border-radius: 8px; margin-bottom: 1rem; display: none; }
        .msg-success { background: rgba(0,200,100,0.15); color: #00c864; }
        .msg-error { background: rgba(255,0,0,0.15); color: #ff4444; }
        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem;
        }
        .checkbox-group label {
            background: rgba(255,255,255,0.06); padding: 6px 12px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s;
        }
        .checkbox-group label:has(input:checked) {
            background: rgba(0,210,255,0.15); border-color: #00d2ff; color: #00d2ff;
        }
        .checkbox-group input { display: none; }
        select option { background: #1a1a3e; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h2>🔧 Admin Login</h2>
            <div id="loginMsg" class="msg"></div>
            <div class="form-group">
                <label>Admin ID</label>
                <input type="text" id="loginId" placeholder="Enter admin ID">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter password">
            </div>
            <button class="submit-btn" onclick="login()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <h1>🔧 MovieZone Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('addMovie')">➕ Add Movie</div>
            <div class="tab" onclick="switchTab('movies')">🎬 All Movies</div>
        </div>

        <!-- ADD MOVIE TAB -->
        <div id="tab-addMovie" class="tab-content active">
            <div class="card">
                <h3>➕ Add New Movie</h3>
                <div id="addMsg" class="msg"></div>
                <div class="form-group">
                    <label>Movie Title *</label>
                    <input type="text" id="movieTitle" placeholder="e.g. Inception (2010)">
                </div>
                <div class="form-group">
                    <label>Download Type</label>
                    <select id="downloadType" onchange="toggleFields()">
                        <option value="single">Single Link</option>
                        <option value="quality">Multi-Quality (480p/720p/1080p)</option>
                        <option value="episode">Episode Series</option>
                    </select>
                </div>
                <div id="singleFields">
                    <div class="form-group">
                        <label>Download Link *</label>
                        <input type="url" id="originalLink" placeholder="https://...">
                    </div>
                </div>
                <div id="qualityFields" style="display:none;">
                    <div class="form-group"><label>480p</label><input type="url" id="q480p"></div>
                    <div class="form-group"><label>720p</label><input type="url" id="q720p"></div>
                    <div class="form-group"><label>1080p</label><input type="url" id="q1080p"></div>
                </div>
                <div id="episodeFields" style="display:none;">
                    <div class="form-group">
                        <label>Episodes (one per line: Name|URL)</label>
                        <textarea id="episodeList" rows="5" placeholder="Episode 1|https://..."></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label>Categories</label>
                    <div class="checkbox-group" id="catBoxes"></div>
                </div>
                <div class="form-group">
                    <label>Languages</label>
                    <div class="checkbox-group" id="langBoxes"></div>
                </div>
                <div class="form-group"><label>Release Year</label><input type="text" id="releaseYear" placeholder="2024"></div>
                <div class="form-group"><label>Runtime</label><input type="text" id="runtime" placeholder="2h 28m"></div>
                <div class="form-group"><label>IMDb Rating</label><input type="text" id="imdbRating" placeholder="8.8"></div>
                <button class="submit-btn" onclick="addMovie()">➕ Add Movie</button>
            </div>
        </div>

        <!-- MOVIES TAB -->
        <div id="tab-movies" class="tab-content">
            <div class="card"><h3>🎬 All Movies</h3><div id="movieList"></div></div>
        </div>
    </div>

    <script>
        const CATS = ["Bollywood 🇮🇳","Hollywood 🇺🇸","South Indian 🎬","Web Series 🎥","Bengali ✨",
            "Anime & cartoon 🌀","Comedy 🤣","Action 💥","Romance 💑","Horror 😱","Thriller 🔍",
            "Sci-Fi 🛸","K-Drama 🎎","Crime 🚔","Fantasy 🧿","Adventure 🗺️","Documentary 📚","Drama 🎭"];
        const LANGS = ["Bengali","Hindi","English","Tamil","Telugu","Korean","Gujarati","Malayalam"];

        document.getElementById('catBoxes').innerHTML = CATS.map(c =>
            `<label><input type="checkbox" value="${c.split(' ')[0]}"> ${c}</label>`).join('');
        document.getElementById('langBoxes').innerHTML = LANGS.map(l =>
            `<label><input type="checkbox" value="${l}"> ${l}</label>`).join('');

        function showMsg(id,msg,type){const e=document.getElementById(id);e.className=`msg msg-${type}`;e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
        function toggleFields(){const t=document.getElementById('downloadType').value;document.getElementById('singleFields').style.display=t==='single'?'':'none';document.getElementById('qualityFields').style.display=t==='quality'?'':'none';document.getElementById('episodeFields').style.display=t==='episode'?'':'none';}
        function getChecked(id){return[...document.querySelectorAll(`#${id} input:checked`)].map(i=>i.value);}

        async function login(){
            const r=await fetch('/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminId:document.getElementById('loginId').value,adminPassword:document.getElementById('loginPass').value})});
            const d=await r.json();
            if(d.success){document.getElementById('loginSection').style.display='none';document.getElementById('dashboard').style.display='block';loadMovies();}
            else showMsg('loginMsg',d.error||'Login failed','error');
        }
        function logout(){document.getElementById('loginSection').style.display='flex';document.getElementById('dashboard').style.display='none';}
        function switchTab(n){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.getElementById('tab-'+n).classList.add('active');if(n==='movies')loadMovies();}

        async function addMovie(){
            const title=document.getElementById('movieTitle').value;if(!title)return showMsg('addMsg','Title required','error');
            const type=document.getElementById('downloadType').value;
            const body={title,downloadType:type,categories:getChecked('catBoxes'),languages:getChecked('langBoxes'),releaseYear:document.getElementById('releaseYear').value||'N/A',runtime:document.getElementById('runtime').value||'N/A',imdbRating:document.getElementById('imdbRating').value||'N/A',status:'pending'};
            if(type==='single')body.originalLink=document.getElementById('originalLink').value;
            if(type==='quality'){body.quality480p=document.getElementById('q480p').value;body.quality720p=document.getElementById('q720p').value;body.quality1080p=document.getElementById('q1080p').value;}
            if(type==='episode'){const lines=document.getElementById('episodeList').value.split('\n').filter(l=>l.trim());const eps={};lines.forEach((l,i)=>{const[n,u]=l.split('|');eps[`E${i+1}`]=u?u.trim():n.trim();});body.episodes=JSON.stringify(eps);}
            const r=await fetch('/api/movie-links',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            const d=await r.json();
            if(d.success){showMsg('addMsg','✅ Movie added! Link: '+d.shortUrl,'success');document.getElementById('movieTitle').value='';}
            else showMsg('addMsg',d.error||'Failed','error');
        }

        async function loadMovies(){
            const r=await fetch('/api/movie-links');const movies=await r.json();const div=document.getElementById('movieList');
            if(!movies.length){div.innerHTML='<p style="color:#666">No movies</p>';return;}
            div.innerHTML=movies.map(m=>`<div class="movie-item"><div class="movie-info"><h4>${m.title}</h4><span class="card-meta">${m.download_type} • ${m.views||0} views</span> <span class="tag tag-${m.status}">${m.status}</span></div><div class="movie-actions"><button class="btn-sm btn-delete" onclick="delMovie(${m.id})">🗑️</button></div></div>`).join('');
        }
        async function delMovie(id){if(!confirm('Delete?'))return;await fetch(`/api/movie-links/${id}`,{method:'DELETE'});loadMovies();}
    </script>
</body>
</html>
