<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieZone - Movie Link Manager</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(
          135deg,
          #0a0a1a 0%,
          #1a1a3e 50%,
          #0d0d2b 100%
        );
        color: #e0e0e0;
        min-height: 100vh;
      }
      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .logo {
        font-size: 4rem;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #00d2ff, #ffd700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
      }
      .subtitle {
        font-size: 1.2rem;
        color: #8899aa;
        margin-bottom: 2rem;
        max-width: 500px;
      }
      .btn-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
      }
      .btn-primary {
        background: linear-gradient(135deg, #00d2ff, #3a7bd5);
        color: #fff;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #ccc;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .stats {
        display: flex;
        gap: 2rem;
        margin-top: 3rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 1.5rem 2rem;
        text-align: center;
        backdrop-filter: blur(10px);
      }
      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: #00d2ff;
      }
      .stat-label {
        font-size: 0.85rem;
        color: #8899aa;
        margin-top: 0.3rem;
      }
      .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 1rem;
        text-align: center;
        color: #555;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="logo">🎬</div>
      <h1>MovieZone</h1>
      <p class="subtitle">
        Manage movie links, create short URLs, and automate Telegram channel
        posts — all from one place.
      </p>
      <div class="btn-group">
        <a href="/sudip" class="btn btn-primary">👑 Owner Panel</a>
        <a href="/admin" class="btn btn-secondary">🔧 Admin Panel</a>
      </div>
      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalMovies">–</div>
          <div class="stat-label">Total Movies</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalViews">–</div>
          <div class="stat-label">Total Views</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="pendingReviews">–</div>
          <div class="stat-label">Pending Reviews</div>
        </div>
      </div>
    </div>
    <div class="footer">MovieZone Integrated Server • Telegram + Web</div>
    <script>
      fetch("/api/movie-links")
        .then((r) => r.json())
        .then((movies) => {
          if (Array.isArray(movies)) {
            document.getElementById("totalMovies").textContent = movies.length;
            const views = movies.reduce((s, m) => s + (m.views || 0), 0);
            document.getElementById("totalViews").textContent = views;
            const pending = movies.filter((m) => m.status === "pending").length;
            document.getElementById("pendingReviews").textContent = pending;
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
